<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>框架3 - 系统设置菜单</title>
    <link rel="stylesheet" href="../CSS/design-tokens.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: var(--ds-font-family-base);
        font-size: var(--ds-font-size-body);
        color: var(--ds-color-text-primary);
        background: var(--ds-color-page-background);
      }

      .app {
        min-height: 100vh;
        display: flex;
      }

      .sidebar {
        width: 160px;
        min-height: 100vh;
        background: #081E40;
        display: flex;
        flex-direction: column;
      }

      .sidebar-header {
        height: 60px;
        padding: 0 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-wrap {
        width: 36px;
        height: 36px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .logo-wrap img {
        width: 24px;
        height: 16px;
        object-fit: contain;
      }

      .sidebar-title {
        font-size: 16px;
        font-weight: 700;
        color: #ffffff;
      }

      .sidebar-divider {
        height: 1px;
        background: #213553;
      }

      .menu {
        flex: 1;
        padding: 12px 10px 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .menu-item {
        height: 40px;
        padding: 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        position: relative;
        border-radius: 4px;
        color: #ffffff;
        text-decoration: none;
        font-size: 14px;
      }

      .menu-item:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .menu-item.active {
        background: #526279;
        font-weight: 700;
      }

      .menu-item.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        width: 3px;
        height: 14px;
        transform: translateY(-50%);
        border-radius: 999px;
        background: var(--ds-color-brand);
      }

      .menu-icon {
        width: 16px;
        height: 16px;
        display: block;
        background-color: transparent;
        background-image: var(--icon);
        background-position: center;
        background-size: contain;
        background-repeat: no-repeat;
        filter: brightness(0) saturate(100%) invert(100%);
        opacity: 1;
        flex-shrink: 0;
      }

      .sidebar-user {
        padding: 12px 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
      }

      .sidebar-footer {
        border-top: 1px solid #213553;
        padding-top: 0;
        position: relative;
        background: #081E40;
        z-index: 2;
      }

      .footer-actions {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 6px 10px 16px;
      }

      .user-main {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .user-arrow {
        width: 14px;
        height: 14px;
        background-color: transparent;
        background-image: url('../assets/icons/nav/下拉 _ 右.svg');
        background-position: center;
        background-size: contain;
        background-repeat: no-repeat;
        filter: brightness(0) saturate(100%) invert(100%);
        transition: transform 0.2s ease;
        flex-shrink: 0;
      }

      .sidebar-user.open .user-arrow {
        transform: rotate(180deg);
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid #FFFFFF;
        background: #F2C14B;
        color: #FFFFFF;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .user-meta {
        min-width: 0;
        display: flex;
        flex-direction: column;
        line-height: 1.3;
      }

      .user-name {
        color: #FFFFFF;
        font-size: 12px;
        font-weight: 700;
      }

      .user-email {
        color: #CED2D9;
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .user-popover {
        position: absolute;
        left: calc(100% + 8px);
        bottom: 12px;
        width: 208px;
        padding: 10px;
        border: 1px solid #E0E6EC;
        border-radius: 8px;
        background: #FFFFFF;
        box-shadow: 0 8px 24px rgba(8, 30, 64, 0.15);
        opacity: 0;
        pointer-events: none;
        transform: translateX(-6px);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .user-popover.open {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(0);
      }

      .popover-title {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        color: #081E40;
        padding: 0 16px;
      }

      .popover-item {
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #081E40;
        font-size: 12px;
        padding: 0 10px;
        border-radius: 4px;
        cursor: pointer;
      }

      .popover-item + .popover-item {
        margin-top: 6px;
      }

      .popover-item:hover {
        background: #F5F7F9;
      }

      .popover-item:active {
        background: #EFF2F6;
      }

      .popover-item.logout:hover {
        background: rgba(234, 55, 54, 0.1);
        color: #081E40;
      }

      .popover-item.logout:hover .popover-icon {
        background: #081E40;
      }

      .popover-item.logout:active {
        background: rgba(234, 55, 54, 0.05);
        color: #EA3736;
      }

      .popover-item.logout:active .popover-icon {
        background: #EA3736;
      }

      .popover-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .popover-icon {
        width: 12px;
        height: 12px;
        display: block;
        background: #081E40;
          -webkit-mask-image: var(--icon);
          -webkit-mask-position: center;
          -webkit-mask-size: contain;
          -webkit-mask-repeat: no-repeat;
          mask-image: var(--icon);
          mask-position: center;
          mask-size: contain;
          mask-repeat: no-repeat;
        flex-shrink: 0;
      }

      .popover-divider {
        margin: 8px 0;
        height: 1px;
        background: #E9EEF4;
      }

      .popover-select {
        margin: 0 0 8px;
        height: 30px;
        border: 1px solid #E0E6EC;
        border-radius: 4px;
        background: #FFFFFF;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        color: #081E40;
        font-size: 12px;
        font-weight: 400;
      }

      .popover-select:hover {
        border-color: #CBD5E0;
      }

      .popover-select:active {
        border-color: #016BFF;
      }

      .popover-right {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #9AA8B8;
        font-size: 12px;
      }

      .popover-right-icon {
        width: 12px;
        height: 12px;
        background: #B8C4D1;
          -webkit-mask-image: url('../assets/icons/nav/下拉 _ 下.svg');
          -webkit-mask-position: center;
          -webkit-mask-size: contain;
          -webkit-mask-repeat: no-repeat;
          mask-image: url('../assets/icons/nav/下拉 _ 下.svg');
          mask-position: center;
          mask-size: contain;
          mask-repeat: no-repeat;
      }

      .content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      .page-topbar {
        height: 56px;
        width: 100%;
        background: #FFFFFF;
        border-bottom: 1px solid #E9EEF4;
        display: flex;
        align-items: center;
        padding-left: 20px;
      }

      .page-title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        color: #081E40;
        line-height: 1;
      }

      .content-body {
        flex: 1;
        background: #F5F9FF;
        padding: 6px;
      }

      .content-layer {
        width: 100%;
        height: 100%;
        background: #FFFFFF;
        padding-top: 10px;
        padding-right: 20px;
        padding-bottom: 0;
        padding-left: 20px;
        overflow: auto;
      }

      .content-card {
        background: #FFFFFF;
        border-radius: 8px;
        box-shadow: var(--ds-shadow-card);
        padding: 16px;
      }

      .content-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .content-title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        color: #081E40;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .search-input {
        width: 220px;
        height: 30px;
        padding: 0 12px;
        border: 1px solid #E0E6EC;
        border-radius: 4px;
        background: #FFFFFF;
        color: #081E40;
        font-size: 12px;
        outline: none;
      }

      .search-input::placeholder {
        color: #CBD5E0;
      }

      .search-input:hover {
        border-color: #CBD5E0;
      }

      .search-input:focus {
        border-color: #016BFF;
      }

      .btn-primary {
        height: 30px;
        padding: 0 16px;
        border: none;
        border-radius: 4px;
        background: #016BFF;
        color: #FFFFFF;
        font-size: 12px;
        cursor: pointer;
      }

      .btn-primary:hover {
        background: #3489FF;
      }

      .btn-primary:active {
        background: #0160E6;
      }

      .table-wrap {
        border: 1px solid #ECF2FB;
        border-radius: 4px;
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead tr {
        height: 40px;
        background: #FAFCFF;
      }

      th,
      td {
        height: 40px;
        padding: 0 12px;
        text-align: left;
        border-bottom: 1px solid #ECF2FB;
        white-space: nowrap;
      }

      th {
        color: #8797AA;
        font-size: 12px;
        font-weight: 400;
      }

      tbody tr:hover {
        background: #F2F8FF;
      }

      .status-enabled {
        color: #016BFF;
      }

      .status-disabled {
        color: #8797AA;
      }

      .note {
        margin-top: 12px;
        color: #8797AA;
        font-size: 12px;
      }

      @media (max-width: 1024px) {
        .app {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo-wrap">
            <img src="../assets/logo/深色-独立-logo.svg" alt="系统设置 Logo" />
          </div>
          <div class="sidebar-title">系统设置</div>
        </div>
        <div class="sidebar-divider"></div>

        <nav class="menu" aria-label="系统设置菜单" data-menu-group="primary">
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/系统概览.svg')"></span>
            <span>系统概览</span>
          </a>
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/席位管理.svg')"></span>
            <span>席位管理</span>
          </a>
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/权限设置.svg')"></span>
            <span>基础配置</span>
          </a>
          <a class="menu-item active" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/租户管理.svg')"></span>
            <span>租户管理</span>
          </a>
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/集成配置.svg')"></span>
            <span>集成配置</span>
          </a>
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/制品配置.svg')"></span>
            <span>制品配置</span>
          </a>
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/告警管理.svg')"></span>
            <span>测试配置</span>
          </a>
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/度量配置.svg')"></span>
            <span>度量配置</span>
          </a>
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/OpenAPI.svg')"></span>
            <span>OpenAPI</span>
          </a>
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/意见反馈.svg')"></span>
            <span>意见反馈</span>
          </a>
          <a class="menu-item" href="#">
            <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/智能引导.svg')"></span>
            <span>智能引导</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="footer-actions" data-menu-group="footer">
            <a class="menu-item" href="#">
              <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/消息中心.svg')"></span>
              <span>消息通知</span>
            </a>
            <a class="menu-item" href="#">
              <span class="menu-icon" style="--icon:url('../assets/icons/menu/系统设置/帮助中心.svg')"></span>
              <span>帮助中心</span>
            </a>
          </div>
          <div class="sidebar-user">
            <div class="user-main">
              <div class="avatar">胡</div>
              <div class="user-meta">
                <div class="user-name">胡静文</div>
                <div class="user-email">huijingwen@company.com</div>
              </div>
            </div>
            <span class="user-arrow" aria-hidden="true"></span>
          </div>
          <div class="user-popover" aria-hidden="true">
            <div class="popover-select">
              <span>蓝盾</span>
              <span class="popover-right-icon" aria-hidden="true"></span>
            </div>
            <div class="popover-divider"></div>
            <div class="popover-item"><span class="popover-left"><span class="popover-icon" style="--icon:url('../assets/icons/nav/用户.svg')"></span><span>个人中心</span></span></div>
            <div class="popover-item"><span class="popover-left"><span class="popover-icon" style="--icon:url('../assets/icons/nav/系统设置.svg')"></span><span>系统设置</span></span></div>
            <div class="popover-item"><span class="popover-left"><span class="popover-icon" style="--icon:url('../assets/icons/nav/控制台.svg')"></span><span>控制台</span></span></div>
            <div class="popover-item"><span class="popover-left"><span class="popover-icon" style="--icon:url('../assets/icons/nav/日志审计.svg')"></span><span>日志审计</span></span></div>
            <div class="popover-item"><span class="popover-left"><span class="popover-icon" style="--icon:url('../assets/icons/nav/版本信息.svg')"></span><span>版本信息</span></span></div>
            <div class="popover-item">
              <span class="popover-left"><span class="popover-icon" style="--icon:url('../assets/icons/nav/外观.svg')"></span><span>外观</span></span>
              <span class="popover-right"><span>深色</span><span class="popover-right-icon" aria-hidden="true"></span></span>
            </div>
            <div class="popover-item"><span class="popover-left"><span class="popover-icon" style="--icon:url('../assets/icons/nav/中英文.svg')"></span><span>English</span></span></div>
            <div class="popover-item logout"><span class="popover-left"><span class="popover-icon" style="--icon:url('../assets/icons/nav/注销.svg')"></span><span>注销</span></span></div>
          </div>
        </div>
      </aside>

      <main class="content">
        <header class="page-topbar">
          <h1 class="page-title">租户管理</h1>
        </header>
        <div class="content-body">
          <div class="content-layer"></div>
        </div>
      </main>
    </div>
    <script>
      (function () {
        var userCard = document.querySelector('.sidebar-user');
        var popover = document.querySelector('.user-popover');
        var pageTitle = document.querySelector('.page-title');
        if (!userCard || !popover) {
          return;
        }

        userCard.addEventListener('click', function (event) {
          event.stopPropagation();
          var opening = !popover.classList.contains('open');
          userCard.classList.toggle('open', opening);
          popover.classList.toggle('open', opening);
        });

        document.querySelectorAll('[data-menu-group]').forEach(function (group) {
          group.addEventListener('click', function (event) {
            var item = event.target.closest('.menu-item');
            if (!item || !group.contains(item)) {
              return;
            }

            event.preventDefault();

            group.querySelectorAll('.menu-item.active').forEach(function (activeItem) {
              activeItem.classList.remove('active');
            });
            item.classList.add('active');

            if (group.getAttribute('data-menu-group') === 'primary' && pageTitle) {
              var label = item.querySelector('span:last-child');
              if (label) {
                pageTitle.textContent = label.textContent.trim();
              }
            }
          });
        });

        document.addEventListener('click', function () {
          userCard.classList.remove('open');
          popover.classList.remove('open');
        });

        popover.addEventListener('click', function (event) {
          event.stopPropagation();
        });
      })();
    </script>
  </body>
</html>
