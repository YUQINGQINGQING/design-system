<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>框架2 - 项目外菜单 / 工作台</title>
    <link rel="stylesheet" href="../CSS/design-tokens.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: var(--ds-font-family-base);
        font-size: var(--ds-font-size-body);
        color: #081E40;
        background: #F5F9FF;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: flex;
      }

      .sidebar {
        width: 160px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #081E40;
      }

      .sidebar-brand {
        height: 56px;
        padding: 0 16px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid #213553;
      }

      .brand-logo {
        width: 130px;
        height: auto;
        object-fit: contain;
        object-position: left center;
      }

      .sidebar-scroll {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .menu-section {
        padding: 12px 8px 0;
      }

      .menu-label {
        height: 28px;
        padding: 0 8px;
        display: flex;
        align-items: center;
        color: #8797AA;
        font-size: 12px;
      }

      .menu-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .menu-item {
        position: relative;
        height: 40px;
        padding: 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 4px;
        color: #FFFFFF;
        text-decoration: none;
        font-size: 14px;
      }

      .menu-item:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .menu-item.active {
        background: #526279;
        font-weight: 700;
      }

      .menu-item.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        width: 3px;
        height: 14px;
        transform: translateY(-50%);
        border-radius: 999px;
        background: #016BFF;
      }

      .menu-icon {
        width: 16px;
        height: 16px;
        display: block;
        flex-shrink: 0;
        background-color: transparent;
        background-image: var(--icon);
        background-position: center;
        background-size: contain;
        background-repeat: no-repeat;
      }

      .menu-item.active .menu-icon {
        opacity: 1;
      }

      .menu-icon-white {
        filter: brightness(0) saturate(100%) invert(100%);
        opacity: 1;
      }

      .sidebar-footer {
        border-top: 1px solid #213553;
        position: relative;
        background: #081E40;
        z-index: 2;
      }

      .footer-actions {
        padding: 6px 8px 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .sidebar-user {
        padding: 12px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
      }

      .user-main {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid #FFFFFF;
        background: #F2C14B;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #FFFFFF;
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .user-meta {
        min-width: 0;
      }

      .user-name {
        color: #FFFFFF;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.3;
      }

      .user-email {
        color: #CED2D9;
        font-size: 11px;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .user-arrow {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        background-color: transparent;
        background-image: url('../assets/icons/nav/下拉 _ 右.svg');
        background-position: center;
        background-size: contain;
        background-repeat: no-repeat;
        filter: brightness(0) saturate(100%) invert(100%);
        transition: transform 0.2s ease;
      }

      .sidebar-user.open .user-arrow {
        transform: rotate(180deg);
      }

      .user-popover {
        position: absolute;
        left: calc(100% + 8px);
        bottom: 12px;
        width: 208px;
        padding: 10px;
        border: 1px solid #E0E6EC;
        border-radius: 8px;
        background: #FFFFFF;
        box-shadow: 0 8px 24px rgba(8, 30, 64, 0.15);
        opacity: 0;
        pointer-events: none;
        transform: translateX(-6px);
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 5;
      }

      .user-popover.open {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(0);
      }

      .popover-select {
        height: 30px;
        padding: 0 12px;
        border: 1px solid #E0E6EC;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #081E40;
        font-size: 12px;
      }

      .popover-select:hover {
        border-color: #CBD5E0;
      }

      .popover-select:active {
        border-color: #016BFF;
      }

      .popover-divider {
        height: 1px;
        margin: 8px 0;
        background: #E9EEF4;
      }

      .popover-item {
        height: 30px;
        padding: 0 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-radius: 4px;
        color: #081E40;
        font-size: 12px;
      }

      .popover-item + .popover-item {
        margin-top: 6px;
      }

      .popover-item:hover {
        background: #F5F7F9;
      }

      .popover-item:active {
        background: #EFF2F6;
      }

      .popover-item.logout:hover {
        background: rgba(234, 55, 54, 0.1);
        color: #081E40;
      }

      .popover-item.logout:active {
        background: rgba(234, 55, 54, 0.05);
        color: #EA3736;
      }

      .popover-item.logout:active .popover-icon {
        filter: brightness(0) saturate(100%) invert(31%) sepia(82%) saturate(2581%) hue-rotate(338deg) brightness(97%) contrast(92%);
      }

      .popover-left,
      .popover-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .popover-right {
        color: #8797AA;
      }

      .popover-icon,
      .popover-right-icon {
        width: 12px;
        height: 12px;
        display: block;
        flex-shrink: 0;
        background-color: transparent;
        background-image: var(--icon);
        background-position: center;
        background-size: contain;
        background-repeat: no-repeat;
        filter: brightness(0) saturate(100%) invert(10%) sepia(38%) saturate(1359%) hue-rotate(189deg) brightness(97%) contrast(101%);
      }

      .popover-right-icon {
        opacity: 1;
      }

      .main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      .workspace-bar {
        height: 56px;
        padding: 0;
        display: flex;
        align-items: center;
        background: #FFFFFF;
        border-bottom: 1px solid #E9EEF4;
      }

      .topbar-mode {
        display: none;
        height: 100%;
      }

      .topbar-mode.active {
        display: flex;
      }

      .topbar-project {
        width: 100%;
      }

      .project-nav {
        display: flex;
        align-items: center;
        gap: 6px;
        padding-left: 20px;
        min-width: 0;
        height: 100%;
        overflow: auto hidden;
        scrollbar-width: none;
      }

      .project-nav::-webkit-scrollbar {
        display: none;
      }

      .nav-item {
        border: none;
        background: transparent;
        color: #081E40;
        white-space: nowrap;
        cursor: pointer;
        height: 100%;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        position: relative;
        font-size: 14px;
      }

      .nav-item:hover {
        color: #016BFF;
        background: transparent;
      }

      .nav-item.active {
        color: #016BFF;
        font-weight: 700;
      }

      .nav-item.active::after {
        content: "";
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 0;
        height: 3px;
        background: currentColor;
        border-radius: 999px;
      }

      .workspace-body {
        flex: 1;
        min-height: 0;
        background: #F5F9FF;
        padding: 6px;
      }

      .content-layer {
        width: 100%;
        height: 100%;
        background: #FFFFFF;
        padding-top: 10px;
        padding-right: 20px;
        padding-bottom: 0;
        padding-left: 20px;
        overflow: auto;
      }

      .dashboard-grid {
        min-height: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
      }

      .primary-column,
      .secondary-column {
        min-height: 0;
      }

      .primary-column {
        border-right: 1px solid #E9EEF4;
        background: #FFFFFF;
        display: flex;
        flex-direction: column;
      }

      .secondary-column {
        background: #FFFFFF;
        display: flex;
        flex-direction: column;
      }

      .panel-header {
        min-height: 44px;
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #ECF2FB;
      }

      .panel-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 16px;
        font-weight: 700;
        color: #081E40;
      }

      .panel-title-icon {
        width: 16px;
        height: 16px;
        background: #526279;
          -webkit-mask-image: var(--icon);
          -webkit-mask-position: center;
          -webkit-mask-size: contain;
          -webkit-mask-repeat: no-repeat;
          mask-image: var(--icon);
          mask-position: center;
          mask-size: contain;
          mask-repeat: no-repeat;
      }

      .panel-tabs {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px;
        border-radius: 6px;
        background: #F5F7F9;
      }

      .tab-chip {
        height: 28px;
        padding: 0 12px;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        color: #526279;
        font-size: 12px;
        text-decoration: none;
      }

      .tab-chip.active {
        background: #FFFFFF;
        color: #016BFF;
        font-weight: 700;
        box-shadow: 0 1px 2px rgba(8, 30, 64, 0.06);
      }

      .panel-body {
        flex: 1;
        min-height: 0;
      }

      .empty-wrap {
        height: 100%;
        min-height: 560px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .empty-state {
        text-align: center;
      }

      .empty-graphic {
        width: 132px;
        height: 132px;
        margin: 0 auto 16px;
        background: #EAF2FF;
        border-radius: 50%;
        position: relative;
      }

      .empty-graphic::before {
        content: "";
        position: absolute;
        inset: 20px;
        border-radius: 16px;
        background: #FFFFFF;
        box-shadow: 0 8px 20px rgba(1, 107, 255, 0.08);
        background-image: url('../assets/icons/nav/暂无数据.svg');
        background-repeat: no-repeat;
        background-position: center;
        background-size: 78px 78px;
      }

      .empty-text {
        color: #081E40;
        font-size: 18px;
        font-weight: 700;
      }

      .secondary-panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .secondary-panel + .secondary-panel {
        border-top: 1px solid #E9EEF4;
      }

      .panel-tools {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-ghost,
      .btn-primary-light {
        height: 30px;
        padding: 0 12px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
      }

      .btn-ghost {
        border: 1px solid #E0E6EC;
        background: #FFFFFF;
        color: #081E40;
      }

      .btn-ghost:hover {
        background: #EAEEF3;
      }

      .btn-primary-light {
        border: 1px solid #016BFF;
        background: #FFFFFF;
        color: #016BFF;
      }

      .btn-primary-light:hover {
        background: #F5F9FF;
      }

      .search-bar {
        padding: 12px 16px;
        border-bottom: 1px solid #ECF2FB;
      }

      .search-field {
        height: 32px;
        border: 1px solid #E0E6EC;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        color: #8797AA;
        font-size: 12px;
      }

      .search-field:hover {
        border-color: #CBD5E0;
      }

      .field-icon {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        background: #CBD5E0;
          -webkit-mask-image: var(--icon);
          -webkit-mask-position: center;
          -webkit-mask-size: contain;
          -webkit-mask-repeat: no-repeat;
          mask-image: var(--icon);
          mask-position: center;
          mask-size: contain;
          mask-repeat: no-repeat;
      }

      .history-list,
      .notice-list {
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .history-item,
      .notice-item {
        padding: 0 16px;
        border-bottom: 1px solid #ECF2FB;
      }

      .history-link {
        height: 38px;
        display: grid;
        grid-template-columns: 16px minmax(0, 1fr) 24px;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: #526279;
        font-size: 12px;
      }

      .history-item:hover {
        background: #F5F9FF;
      }

      .star-icon {
        width: 14px;
        height: 14px;
        background: #CBD5E0;
          -webkit-mask-image: url('../assets/icons/nav/收藏.svg');
          -webkit-mask-position: center;
          -webkit-mask-size: contain;
          -webkit-mask-repeat: no-repeat;
          mask-image: url('../assets/icons/nav/收藏.svg');
          mask-position: center;
          mask-size: contain;
          mask-repeat: no-repeat;
      }

      .history-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .history-badge {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        background: #EEF5FF;
        color: #5B8FF9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }

      .notice-list {
        overflow: auto;
      }

      .notice-item {
        padding-top: 14px;
        padding-bottom: 14px;
      }

      .notice-row {
        display: grid;
        grid-template-columns: 32px minmax(0, 1fr);
        gap: 10px;
      }

      .notice-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #F2F8FF;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .notice-avatar::before {
        content: "";
        width: 16px;
        height: 16px;
        background: #081E40;
          -webkit-mask-image: url('../assets/icons/nav/消息通知.svg');
          -webkit-mask-position: center;
          -webkit-mask-size: contain;
          -webkit-mask-repeat: no-repeat;
          mask-image: url('../assets/icons/nav/消息通知.svg');
          mask-position: center;
          mask-size: contain;
          mask-repeat: no-repeat;
      }

      .notice-content {
        min-width: 0;
      }

      .notice-text {
        color: #081E40;
        font-size: 12px;
        line-height: 1.6;
      }

      .notice-date {
        margin-top: 8px;
        color: #8797AA;
        font-size: 12px;
        text-align: right;
      }

      .toolbar-select {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: #081E40;
        font-size: 12px;
      }

      .toolbar-select .field-icon {
        width: 12px;
        height: 12px;
        background: #8797AA;
      }

      @media (max-width: 1200px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }

        .primary-column {
          border-right: none;
          border-bottom: 1px solid #E9EEF4;
        }
      }

      @media (max-width: 960px) {
        .app {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          min-height: auto;
        }

        .workspace-bar {
          height: auto;
          padding: 12px 16px;
        }

        .project-nav {
          height: 32px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <img class="brand-logo" src="../assets/logo/icon-bk-devops-white.svg" alt="蓝酸 DevOps" />
        </div>

        <div class="sidebar-scroll">
          <div class="menu-section">
            <nav class="menu-group" aria-label="工作台菜单" data-menu-group="primary" data-icon-mode="swap">
              <a class="menu-item" href="#" data-has-secondary="true" data-secondary-items="需求池|项目">

                <span>软件源</span>
              </a>

                <span>GitLab</span>
              </a>
              <a class="menu-item" href="#">
                <span class="menu-icon" data-icon-default="../assets/icons/menu/平台%26项目-深色模式/价值流插件库-深色-default.svg" data-icon-click="../assets/icons/menu/平台%26项目-深色模式/价值流插件库-深色-click.svg" style="--icon:url('../assets/icons/menu/平台%26项目-深色模式/价值流插件库-深色-default.svg')"></span>
                <span>价值流插件库</span>
              </a>
              <a class="menu-item" href="#">
                <span class="menu-icon" data-icon-default="../assets/icons/menu/平台%26项目-深色模式/版本管理-深色-default.svg" data-icon-click="../assets/icons/menu/平台%26项目-深色模式/版本管理-深色-click.svg" style="--icon:url('../assets/icons/menu/平台%26项目-深色模式/版本管理-深色-default.svg')"></span>
                <span>版本管理</span>
              </a>
              <a class="menu-item" href="#">
                <span class="menu-icon" data-icon-default="../assets/icons/menu/平台%26项目-深色模式/代码库-深色-default.svg" data-icon-click="../assets/icons/menu/平台%26项目-深色模式/代码库-深色-click.svg" style="--icon:url('../assets/icons/menu/平台%26项目-深色模式/代码库-深色-default.svg')"></span>
                <span>代码库</span>
              </a>
              <a class="menu-item" href="#" data-has-secondary="true" data-secondary-items="效能洞察|仪表板|数据集|数据集|权限配置|报告管理">
                <span class="menu-icon" data-icon-default="../assets/icons/menu/平台%26项目-深色模式/效能洞察-深色-default.svg" data-icon-click="../assets/icons/menu/平台%26项目-深色模式/效能洞察-深色-click.svg" style="--icon:url('../assets/icons/menu/平台%26项目-深色模式/效能洞察-深色-default.svg')"></span>

              <a class="menu-item" href="#">
                <span class="menu-icon" data-icon-default="../assets/icons/menu/平台%26项目-深色模式/知识库-深色-default.svg" data-icon-click="../assets/icons/menu/平台%26项目-深色模式/知识库-深色-click.svg" style="--icon:url('../assets/icons/menu/平台%26项目-深色模式/知识库-深色-default.svg')"></span>
                <span>知识库</span>

    <script>
      (function () {
        function syncMenuIcons(group) {
          if (!group || group.getAttribute('data-icon-mode') !== 'swap') {
            return;
          }

          group.querySelectorAll('.menu-item').forEach(function (item) {
            var icon = item.querySelector('.menu-icon');
            if (!icon) {
              return;
            }

            var defaultIcon = icon.getAttribute('data-icon-default');
            var clickIcon = icon.getAttribute('data-icon-click');
            if (!defaultIcon || !clickIcon) {
              return;
            }

            var url = item.classList.contains('active') ? clickIcon : defaultIcon;
            icon.style.setProperty('--icon', "url('" + url + "')");
          });
        }

        var userCard = document.querySelector('.sidebar-user');
        var popover = document.querySelector('.user-popover');

        if (userCard && popover) {
          userCard.addEventListener('click', function (event) {
            event.stopPropagation();
            var opening = !popover.classList.contains('open');
            userCard.classList.toggle('open', opening);
            popover.classList.toggle('open', opening);
          });

          popover.addEventListener('click', function (event) {
            event.stopPropagation();
          });

          document.addEventListener('click', function () {
            userCard.classList.remove('open');
            popover.classList.remove('open');
          });
        }

        document.querySelectorAll('[data-menu-group]').forEach(function (group) {
          syncMenuIcons(group);

          group.addEventListener('click', function (event) {
            var item = event.target.closest('.menu-item');
            if (!item || !group.contains(item)) {
              return;
            }

            group.querySelectorAll('.menu-item.active').forEach(function (activeItem) {
              activeItem.classList.remove('active');
            });
            item.classList.add('active');
            syncMenuIcons(group);

            if (group.getAttribute('data-menu-group') === 'primary') {
              updateTopbarMode(item);
            }
          });
        });

        function updateTopbarMode(activeMenuItem) {
          if (!activeMenuItem) {
            return;
          }

          var hasSecondary = activeMenuItem.getAttribute('data-has-secondary') === 'true';
          var secondaryItems = (activeMenuItem.getAttribute('data-secondary-items') || '')
            .split('|')
            .map(function (item) { return item.trim(); })
            .filter(Boolean);
          var projectTopbar = document.querySelector('[data-topbar-mode="project"]');

          if (!projectTopbar) {
            return;
          }

          if (hasSecondary) {
            projectTopbar.innerHTML = '';
            secondaryItems.forEach(function (itemText, index) {
              var button = document.createElement('button');
              button.type = 'button';
              button.className = 'nav-item' + (index === 0 ? ' active' : '');
              button.textContent = itemText;
              projectTopbar.appendChild(button);
            });
            projectTopbar.classList.add('active');
          } else {
            projectTopbar.innerHTML = '';
            projectTopbar.classList.remove('active');
          }
        }

        var activePrimaryMenu = document.querySelector('[data-menu-group="primary"] .menu-item.active');
        updateTopbarMode(activePrimaryMenu);

        document.querySelectorAll('[data-tab-group]').forEach(function (group) {
          group.addEventListener('click', function (event) {
            var target = event.target.closest('.tab-chip, .nav-item');
            if (!target || !group.contains(target)) {
              return;
            }

            if (target.classList.contains('tab-chip')) {
              event.preventDefault();
            }

            group.querySelectorAll('.active').forEach(function (activeTab) {
              activeTab.classList.remove('active');
            });
            target.classList.add('active');
          });
        });
      })();
    </script>
